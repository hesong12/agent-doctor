name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        # Include the [sprite] extra so the Pillow-dependent
        # sprite-pipeline + pet-generate-sprite tests actually run
        # in CI instead of skipping silently via importorskip("PIL").
        # Required by PR #19 acceptance #2: the floodfill white-bg
        # regression must be CI-gated, not just locally observable.
        run: python -m pip install -e ".[dev,sprite]"
      - name: Tests
        run: python -m pytest -q

  bench:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install
        run: python -m pip install -e ".[dev]"
      - name: Generate corpus
        run: python -m agent_doctor.cli eval generate --cards tests/fixtures/cards --out ./corpus
      - name: Run detection bench (gates 0.95 / 0.85)
        run: |
          python -m agent_doctor.cli eval bench \
            --corpus ./corpus \
            --out ./bench \
            --gate-precision 0.95 \
            --gate-recall 0.85
      - name: Upload bench report
        uses: actions/upload-artifact@v4
        with:
          name: bench
          path: bench/
